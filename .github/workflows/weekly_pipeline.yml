name: Weekly newsletter pipeline

# Runs the full multi-agent pipeline once a week and pushes the resulting
# issue to Postgres. The Vercel cron in web/vercel.json then picks up the
# new issue and emails Top-5 personalized digests to onboarded users.
#
# Schedule: Every Monday 10:00 UTC (≈ 06:00 ET / 18:00 China Standard).
# Manually triggerable via "Run workflow" too.
#
# Required repo secrets:
#   OPENAI_API_KEY      — single key for everything: gpt-5-mini for steps
#                         1-6/8, gpt-5 for the writer (step 7), and
#                         text-embedding-3-small for the Step 9 sync.
#   DATABASE_URL        — Postgres write target (Step 9)
#   TAVILY_API_KEY      — optional, gives Step 1 fresh web grounding
#
# What this workflow does NOT do:
#   - Roll back on partial failure (each step writes an artifact; rerun
#     with `--start-at N` from your laptop if a step fails).
#   - Send the weekly email digest. That's a separate Vercel cron at
#     web/vercel.json (`0 14 * * 1`), running 4h after this workflow so
#     freshly-synced items are included.

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      date:
        description: "Issue date (YYYY-MM-DD). Default = today."
        required: false
      modules:
        description: "Modules to run (comma-separated)"
        required: false
        default: "model,product"

permissions:
  contents: write   # so we can commit the run folder back to the repo

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONIOENCODING: utf-8
        run: |
          DATE="${{ github.event.inputs.date }}"
          MODULES="${{ github.event.inputs.modules || 'model,product' }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%F); fi
          python tools/run_pipeline.py --date "$DATE" --modules "$MODULES"

      - name: Commit run folder back
        env:
          DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -z "$DATE" ]; then DATE=$(date -u +%F); fi
          git config user.name "newsletter-bot"
          git config user.email "newsletter-bot@users.noreply.github.com"
          git add "newsletter_runs/$DATE"
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
          else
            git commit -m "Auto: weekly pipeline run $DATE"
            git push
          fi
