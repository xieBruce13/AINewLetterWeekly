  caption: "NVIDIA"

# Adobe Firefly — design tooling
- match: { name_contains: "Firefly" }
  image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Adobe_Corporate_Logo.png/1280px-Adobe_Corporate_Logo.png"
  caption: "Adobe Firefly"

