# tools/image_overrides.yaml — hand-curated images for the highest-priority items
#
# Each entry has the form:
#
#   - match:                       # one or more conditions, ALL must be true
#       slug_contains:  string     # substring match on the issue-date slug
#       company:        string     # exact match (case-insensitive)
#       name_contains:  string     # substring match on the item name
#       tags_contains:  string     # one of the item's tags equals this
#     image: <https URL>           # the image to use
#     caption: string              # optional, not yet rendered
#
# CASCADE NOTE: as of 2026-05-07, image_resolver.py uses overrides as a
# LAST-RESORT fallback. The cascade is:
#   1. RSS image candidates  →  2. og:image scrape  →  3. these overrides
# So if a publisher has a real product hero image in their og:image, that
# wins. These overrides only kick in for items with no usable scrape result.
#
# Every URL here is HEAD-validated by the resolver before being used. If
# you add an entry that 404s or 400s (e.g. a Wikimedia small thumbnail —
# only 1280px sizes are reliably pre-rendered), it will silently be
# skipped and the card will render the gradient placeholder instead.

# ---------------------------------------------------------------------------
# Verified durable URLs — all checked 2026-05-07.
# Wikimedia: ALWAYS use 1280px thumbnails; smaller sizes return 400.
# ---------------------------------------------------------------------------

- match: { company: "Anthropic" }
