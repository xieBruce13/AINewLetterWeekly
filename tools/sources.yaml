# tools/sources.yaml — AI Newsletter source registry
#
# This is the single source of truth for all news collection.
# Edit this file to add/remove/update sources — no Python changes needed.
#
# Field reference:
#   name        : Display name for the source
#   url         : RSS/Atom feed URL
#   tier        : "official" | "press" | "community"
#                   official = the company's own blog/release notes
#                   press    = journalism / aggregator coverage
#                   community= forums, social signals
#   module      : "model" | "product" | "operation" | null
#                   null  = auto-classify from content
#   tags        : list of topic tags for downstream filtering
#   active      : false to temporarily disable without deleting (default: true)
#   notes       : optional comment visible to editors
#
# Tier weight used by rule_filter.py for importance scoring:
#   official → +3 points
#   press    → +1 point
#   community→ +0 points (signals from votes/comments instead)

